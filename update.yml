name: Update Video Directory

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch videos from Vimeo API
        env:
          VIMEO_TOKEN: ${{ secrets.VIMEO_TOKEN }}
        run: python fetch_videos.py

      - name: Build index.html
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "chore: update video directory"
          git push
